name: Docker Publish

on:
  push:
    branches:
      - main
      - development
  release:
    types:
      - created

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: metadata
        shell: bash
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          SHORT_SHA="${GITHUB_SHA::7}"

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            BRANCH_NAME="${{ github.event.release.target_commitish }}"
          else
            BRANCH_NAME="${GITHUB_REF_NAME}"
          fi

          BRANCH_TAG="${BRANCH_NAME//\//-}"
          BRANCH_TAG="${BRANCH_TAG,,}"

          if [[ -z "${BRANCH_TAG}" ]]; then
            BRANCH_TAG="unknown"
          fi

          {
            echo "image_name=${IMAGE_NAME}"
            echo "short_sha=${SHORT_SHA}"
            echo "branch_tag=${BRANCH_TAG}"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create image tags
        id: tags
        shell: bash
        run: |
          TAGS="${{ steps.metadata.outputs.image_name }}:${{ steps.metadata.outputs.branch_tag }}
          ${{ steps.metadata.outputs.image_name }}:sha-${{ steps.metadata.outputs.short_sha }}"

          if [[ "${{ steps.metadata.outputs.branch_tag }}" == "main" || "${{ steps.metadata.outputs.branch_tag }}" == "master" ]]; then
            TAGS="${TAGS}
          ${{ steps.metadata.outputs.image_name }}:latest"
          fi

          echo "tags<<EOF" >> "${GITHUB_OUTPUT}"
          echo "${TAGS}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
